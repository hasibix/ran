name: Build & Release Rust Project

on:
    workflow_dispatch:

jobs:
    build:
        runs-on: codeberg-medium
        uses: ./.forgejo/workflows/build.yml

    release:
        runs-on: codeberg-small
        needs: build
        permissions:
            contents: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  persist-credentials: false

            - name: Read version
              id: get_version
              run: |
                  echo "::set-output $(cat version.txt | tr -d " \n\r")"

            - name: Install deps
              run: |
                  apt update
                  apt install -y zip unzip tar

            - name: Download build artifacts
              uses: forgejo/download-artifact@v4
              with:
                  pattern: release-artifacts-*
                  path: dist
                  merge-multiple: true

            - name: Create Release
              uses: actions/forgejo-release@v2
              with:
                  direction: upload
                  tag: ${{ steps.get_version.outputs.version }}
                  title: ${{ steps.get_version.outputs.version }}
                  token: ${{ secrets.ACTIONS_RELEASE_TOKEN }}
                  release-notes-file: release.md
                  prerelease: false
                  release-dir: dist
